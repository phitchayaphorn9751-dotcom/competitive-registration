<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CAMT Competition</title>

    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- ═══════════════════════════════════════════════════════════
         ศูนย์รวมธีม (Design Tokens) — แก้ที่นี่ที่เดียว เปลี่ยนทั้งเว็บ
         วิธีใช้ใน class:  bg-brand / text-brand / border-brand
                          rounded-card / rounded-pill
         ═══════════════════════════════════════════════════════════ -->
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: "#F15A24",        // ← สีหลัก (ส้ม CAMT)
              "brand-dark": "#c44215", // ← ส้มเข้ม (hover)
              "brand-soft": "#fff1e8", // ← ส้มอ่อน (พื้นหลัง)
            },
            borderRadius: {
              card: "1rem",      // ← มุมโค้งการ์ด (= rounded-2xl เดิม)
              pill: "0.5rem",    // ← มุมโค้ง badge/ปุ่มเล็ก
            },
            fontFamily: {
              sans: ["Sarabun", "system-ui", "sans-serif"], // ← ฟอนต์หลักทั้งเว็บ
            },
          },
        },
      }
    </script>

    <!-- ฟอนต์หลัก: Sarabun (เปลี่ยนฟอนต์ → แก้ทั้ง 2 จุด: ลิงก์นี้ + fontFamily ด้านบน) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

    <style>
      body { font-family: 'Sarabun', system-ui, sans-serif; }
      @keyframes fade-in { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
      .animate-fade-in { animation: fade-in 0.2s ease-out; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
